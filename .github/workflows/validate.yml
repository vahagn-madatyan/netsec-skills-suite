name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate-skills:
    name: Validate SKILL.md files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python 3.x
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.x"

      - name: Install skills-ref validator
        run: pip install skills-ref==0.1.1

      - name: Run spec validation (agentskills)
        run: |
          failed=0
          for skill_dir in skills/*/; do
            if ! agentskills validate "$skill_dir"; then
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            echo "::error::One or more skills failed validation"
            exit 1
          fi

      - name: Run convention validation (custom)
        run: bash scripts/validate.sh
