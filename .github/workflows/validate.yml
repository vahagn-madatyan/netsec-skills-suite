name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate-skills:
    name: Validate SKILL.md files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.x
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install skills-ref validator
        run: pip install skills-ref==0.1.1

      - name: Run spec validation (agentskills)
        run: agentskills validate skills/

      - name: Run convention validation (custom)
        run: bash scripts/validate.sh
