name: Validate Skills

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate-skills:
    name: Validate SKILL.md files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python 3.x
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.x"

      - name: Install skills-ref validator
        run: pip install skills-ref==0.1.1

      - name: Run spec validation (agentskills)
        run: |
          failed=0
          for skill_dir in skills/*/; do
            if ! agentskills validate "$skill_dir"; then
              failed=1
            fi
          done
          if [ "$failed" -ne 0 ]; then
            echo "::error::One or more skills failed validation"
            exit 1
          fi

      - name: Run convention validation (custom)
        run: bash scripts/validate.sh
